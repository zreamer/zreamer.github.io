<h1>物理笔记</h1>
<h2>浮力</h2>
<p>浮力的施力物体:液体或气体;受力物体:浸没在液体或气体中的物体<br>浮力的成因:物体上下压强不同，合力竖直向上<br>物体未被完全浸没时，只在下表面受到液体的压力<br>物体在容器底，与容器底无缝隙时，不受浮力<br>物体在容器侧壁上，受浮力</p>
