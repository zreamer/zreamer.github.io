<h2>例题</h2>
<p>16.已知一次函数<i>y=(2m+1)x+m-3</i>经过点(3,2)，求该一次函数解析式</p>
<p><br>因为图像经过(3,2)<br>所以x=3时y=2<br>即3(2m+1)+m-3=2<br>解得m=2/7<br>y=(11/7)x-(19/7)</p>
