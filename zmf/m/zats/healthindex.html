<script>
// 定义一个函数来处理查询
function queryInfo() {
    // 获取用户输入的变量名
    var inputVar = document.getElementById("infoInput").value;
    
    // 根据变量名返回相应的值
    if (inputVar === "神曲") {
        alert("神曲是一种传统的中药材，由辣蓼、青蒿、杏仁等药物加入面粉或麸皮混合后，经发酵而成的曲剂。它的性味为甘辛，温，归脾、胃经。\n神曲的主要功效包括健脾和胃、消食调中。它被用于治疗饮食停滞、胸痞腹胀、呕吐泻痢、产后瘀血腹痛、小儿腹大坚积等症状。神曲能够促进消化、增进食欲，具有B族维生素样作用。\n神曲的炮制方法包括炒神曲和焦神曲。炒神曲是将神曲与麸皮一同炒至黄色，而焦神曲则是将神曲炒至外表焦黑、内部焦黄。\n在临床应用上，神曲可以煎服，常用量为6～15g。它常与山楂、麦芽等药物配伍使用，以增强消食效果。此外，神曲还可用于丸剂中，帮助消化金石、贝壳类药物。\n需要注意的是，神曲性温，对于脾阴不足、胃火盛以及孕妇应慎用。");
    } else if (inputVar === "当归") {
        alert("当归是一种常用的中药材，具有以下性味及功效：\n1. 性味：味甘、辛，性温。\n2. 归经：归肝经、心经、脾经。\n3. 功效：补血活血、调经止痛、润肠通便。\n当归在临床上的应用非常广泛，主要用于治疗以下症状：\n血虚萎黄：面色苍白、眩晕心悸等症状。\n月经不调、经闭痛经：女性月经不调、痛经等妇科病症。\n虚寒腹痛、肠燥便秘：由于血虚或肠燥引起的便秘。\n风湿痹痛、跌扑损伤：跌打损伤、瘀血肿痛、筋骨损伤等。\n痈疽疮疡：疮疡肿痛等症状。\n此外，当归还具有抗炎镇痛、抗缺氧、抗疲劳、抗肿瘤等作用，并且对中枢神经系统有轻度抑制作用，对小鼠体温有降温作用，对小鼠学习记忆有明显影响。当归还能抑制肠肌收缩，抑制胃刺激引起的胃酸分泌，具有保肝作用，能明显促进胆汁分泌，对肾脏有保护作用，具有利尿作用，对膀胱平滑肌有兴奋作用。\n需要注意的是，当归虽然具有多种功效，但也存在一些禁忌，如湿盛中满及大便溏泄者应慎用。在使用当归时，应遵循医嘱，以确保安全有效。");
    } else if (inputVar === "附子"){
        alert("附子是毛茛科植物乌头的旁生块根（子根），其性味为辛、甘，大热，有毒，归心、肾、脾经。附子的主要功效包括回阳救逆、补火助阳、散寒止痛。它被用于治疗亡阳虚脱、肢冷脉微、心阳不足、胸痹心痛、虚寒吐泻、脘腹冷痛、肾阳虚衰、阳痿宫冷、阴寒水肿、阳虚外感、寒湿痹痛等症状。\n附子的药理作用包括强心、抗心肌缺血、抗休克、抑制凝血功能和抗血栓形成、抗炎、镇痛、局部麻醉、增强体液免疫等。附子含有多种生物碱，如乌头碱、中乌头碱、次乌头碱等，这些成分赋予了附子其独特的药理作用。\n在使用附子时，需要注意其有毒性质，因此用量和炮制方法需要严格控制。一般用量为3～15克，需要先煎、久煎以减低毒性。此外，孕妇慎用附子，且不宜与半夏、瓜蒌、瓜萎子等药材同用。在临床应用中，附子常与其他药材配伍，以增强疗效或减轻其毒性。");
    } else if (inputVar === "十八反十九畏"){
        alert("十八反 包括：1. 甘草反甘遂、京大戟、海藻、芫花；2. 乌头反贝母、瓜蒌、半夏、白蔹、白芨；3. 藜芦反人参、沙参、丹参、玄参、细辛、芍药。十九畏 包括：1. 硫黄畏朴硝；2. 水银畏砒霜；3. 狼毒畏密陀僧；4. 巴豆畏牵牛；5. 丁香畏郁金；6. 川乌、草乌畏犀角；7. 牙硝畏三棱；8. 官桂畏赤石脂；9. 人参畏五灵脂。");
    } else if (inputVar === "丹参"){
        alert("丹参是一种常用的中药材，其性味为苦、微寒，归心、肝经。主要功效包括：\n1. 活血祛瘀：丹参能够促进血液循环，消除血瘀，对于因气血不畅导致的各种疾病有良好效果。\n2. 通经止痛：丹参可以舒经活络，对于月经不调、痛经、闭经等问题有缓解作用，同时对于跌打损伤、风湿痹痛也有一定疗效。\n3. 清心除烦：丹参具有养血安神的功效，对于心烦不眠、疮疡肿痛等症状有改善作用。\n4. 凉血消痈：丹参性微寒，可以凉血消痈，对于热入血分导致的皮肤瘙痒、乳腺炎初期疼痛等症状有治疗效果。\n5. 抗炎、抑制氧化应激：现代药理学研究表明，丹参具有抗炎、抑制氧化应激、保护血管内皮功能等作用。\n6. 保护心肌细胞：丹参中的丹参酮具有保护心肌细胞、改善心肌代谢紊乱、提高心肌耐缺氧能力等作用。\n7. 抗凝血和血栓形成：丹参能够抑制血小板黏附和聚集、抗凝血和血栓形成、降低血黏度、调节血脂。丹参的临床应用广泛，常用于治疗月经不调、痛经经闭、心烦不眠、疮疡肿痛、热痹疼痛、脘腹胁痛、胸痹心痛、症瘕积聚等症。\n此外，丹参还可用于治疗关节炎、乳腺炎、淋巴腺炎、丹毒、急慢性肝炎、肾盂肾炎、神经衰弱性失眠、跌打损伤等。丹参的常用量为9～15克，煎服，大剂量可用至30克。\n在炮制方法上，丹参可以除去杂质和残茎，洗净，润透，切厚片，干燥。酒丹参是取丹参片，加黄酒拌匀，闷润至透，置锅内，用文火炒，取出放凉。\n需要注意的是，丹参不宜与藜芦同用，孕妇慎用。");
    } else if (inputVar === "甘草"){
        alert("甘草是一种常用的中药材，其性味甘、平，归心、肺、脾、胃经。甘草的主要功效包括：1. 补脾益气：用于治疗脾胃虚弱、倦怠乏力、心悸气短等症状。2. 清热解毒：适用于疮疡肿毒、咽喉肿痛等症，可以与其他清热解毒药物如金银花、连翘等配伍使用。3. 祛痰止咳：用于治疗咳嗽痰多、气喘等症状，常与化痰止咳药物配伍。4. 缓急止痛：对于脘腹、四肢挛急疼痛有缓解作用，常与芍药配伍使用。5. 调和诸药：甘草能够减轻一些药物的毒副反应，帮助“君药”发挥作用，使方中诸药同舟共济、驱除病患。甘草的炮制方法包括除去杂质、洗净、润透、切厚片、干燥，以及蜜炙甘草的炮制，即取甘草片，照蜜炙法炒至黄色至深黄色，不粘手时取出，晾凉。在临床应用中，甘草的用量一般为2～10g。甘草生用以清热、降火、解毒为主，炙用则有补益脾胃、温中散寒、除邪热、润肺益气的作用。需要注意的是，甘草不宜与海藻、京大戟、红大戟、甘遂、芫花同用，且湿浊中阻而脘腹胀满、呕吐及水肿者禁服。");
    } else if (inputVar === "京大戟"){
        alert("京大戟的性味为苦、寒，有毒。它归肺经、脾经、肾经。京大戟的主要功效是泻水逐饮，消肿散结。它被用于治疗水肿胀满、胸腹积水、痰饮积聚、气逆喘咳、二便不利等症状。京大戟的用法用量为内服：煎汤，0.5~3g；或入丸、散。外用：适量，研末或熬膏敷；或煎水熏洗。需要注意的是，京大戟有毒性，因此在使用时需要格外小心。患虚寒阴水及孕妇忌服，体弱者慎用。京大戟不宜与甘草同用。");
    } else if (inputVar === "红大戟"){
        alert("红大戟是一种中药材，其性味为苦、寒，并且具有小毒。归经于肺、脾、肾经。红大戟的主要功效是泻水逐饮、解毒消肿散结。它主要用于治疗胸腹积水、二便不利、痈肿疮毒、瘰疬痰核等症状。在临床应用中，红大戟的推荐用量为1.5～3g，可以煎汤服用、研末服用、入丸散服用或泡酒服用。外用时适量，可以捣敷或煎汤洗。需要注意的是，红大戟具有一定的毒性，因此体虚者及孕妇应禁用，且不宜与甘草同用。红大戟的炮制方法包括除去杂质、洗净、润透、切厚片、干燥等步骤。");
    } else if (inputVar === "枳实"){
        alert("枳实是芸香科植物酸橙及其栽培变种或甜橙的干燥幼果。根据搜索结果，枳实的性味为苦、寒，也有资料提到其性味为苦、辛、酸，微寒。枳实归入脾经、胃经，也有说法认为它还归入肝经和心经。枳实的功效主要包括破气消积、化痰散痞。它被用于治疗胸腹胀满、胸痹、痞痛、痰癖、水肿、食积、便秘、胃下垂、子宫下垂、脱肛等症状。此外，枳实还具有抗炎、抗菌、抗病毒、抗变态反应、抗氧化、镇痛、中枢抑制和解热等作用。在炮制方法上，枳实的加工包括拣净杂质、用水浸泡至八成透、润至内无硬心、切片、晾干。炒枳实则是将麸皮撒匀于加热的锅内，待烟冒出时加入枳实片，拌炒至微呈焦黄色，取出后筛去麸皮，放凉。需要注意的是，脾胃虚弱及孕妇应慎用枳实。在实际应用时，应遵循医嘱，以确保安全有效。");
    } else if (inputVar === "密蒙花"){
        alert("密蒙花，学名为Buddleja officinalis Maxim.，属于马钱科植物，以其干燥的花蕾及其花序入药。密蒙花的性味为甘、凉，归入肝经。它具有清热养肝、明目退翳的功效，主要用于治疗目赤肿痛、多泪羞明、眼生翳膜、肝虚目暗、视物昏花等症状。此外，密蒙花还具有抗炎、免疫调节、降血糖、抗氧化、抗血管内皮细胞增生等作用。在临床应用中，密蒙花的常用剂量为3～9克，可以水煎服。药理研究显示，密蒙花可以降低小肠及皮肤毛细管的通透性，对细胞毒素有抑制作用；具有抗炎、解痉、利尿、促进胆汁分泌等功效。密蒙花含有多种化学成分，包括黄酮类、挥发油、黄色素、三萜类、环烯醚萜苷类等，这些成分为其提供了广泛的药理作用。需要注意的是，密蒙花适用于肝火上炎或肝虚有热引起的眼病，但对于目疾属阳虚内寒者则应慎用。在使用时，应遵循医嘱，注意剂量和禁忌。");
    } else if (inputVar === "枸橼"){
        alert("枸橼，也称为香橼，是芸香科植物枸橼或香圆的成熟果实，具有以下性味及功效：1. 性味：辛苦酸，温。2. 功效：枸橼在中医中主要用于疏肝理气、宽中化痰。它能够用于治疗肝胃气滞、胸胁胀痛、脘腹痞满、呕吐噫气、痰多咳嗽等症状。3. 化学成分：枸橼成熟果实含有橙皮甙、柠檬酸、苹果酸、粟胶、鞣质、维生素C及挥发油等。4. 归经：入肝、肺、脾经。5. 用法用量：内服，煎汤，3-6g；或入丸、散。6. 使用禁忌：阴虚血燥及孕妇气虚者慎服。枸橼的气味芳香，辛温行散，能兼行肝脾二经之气，既善疏肝解郁，又能宽中解醒脾，还有行气止痛的效果。在中医中，枸橼也被用于治疗胸腹满闷、胁肋胀痛、咳嗽痰多等症状。");
    } else if (inputVar === "生山楂"){
