<!DOCTYPE html>
<html>
<head>
  <title>Hello World</title>
</head>
<body style="">
<div style="width:30vw;height:100vh;background-color:#dddddd;padding:10px;">

  <button type="button" style="width:100%;height:3%;border-radius:5px;border:none;background:none;" onclick="play('tdiber')" id="tdiber"><h3>These Days in Beijing East Road</h3></button><button type="button" style="width:100%;height:3%;border-radius:5px;border:none;background:none;" onclick="play('wpdphw')" id="wpdphw"><h3>外婆的澎湖湾</h3></button><button type="button" style="width:100%;height:3%;border-radius:5px;border:none;background:none;" onclick="play('aboh')" id="aboh"><h3>A Bit of Happiness</h3></button><button type="button" style="width:100%;height:3%;border-radius:5px;border:none;background:none;" onclick="play('sya')" id="sya"><h3>See You Again</h3></button></div>
  <audio id="au">
  <source src="" type="audio/mpeg">
  </audio>
  <div style="width:70vw;height:100vh;background-color:none;padding:10px;position:absolute;top:0;right:0;margin:8px;text-align:center">
  
<button type="button" style="position:absolute;top:75vh;left:20vh;background-color:#9ac1ee;border-radius:5px;border:none" onclick="sas()">播放/暂停</button></div>
  <script>
  let i = 1;
  function play(s) {
 	 document.getElementById('tdiber').style.background='none';
	  document.getElementById('wpdphw').style.background='none';
	  document.getElementById('aboh').style.background='none';
	  document.getElementById('sya').style.background='none';
	  document.getElementById('tdiber').style.border='none';
	  document.getElementById('wpdphw').style.border='none';
	  document.getElementById('aboh').style.border='none';
	  document.getElementById('sya').style.border='none';
	  document.getElementById('au').src='msc/'+s+'.mp3';
	  document.getElementById('au').play();
	  document.getElementById(s).style.backgroundColor='#eeeefa';
	  document.getElementById(s).style.borderLeft='solid 3px #6666bb';
	  document.getElementById('im').src=s+'.png';
  }
  function sas() {
 	 if (i==1) {
 		 document.getElementById('au').pause();
		  i=2;
 	 }else {
 		 document.getElementById('au').play();
		  i=1;
 	 }
  }
  </script>
</body>
</html>
