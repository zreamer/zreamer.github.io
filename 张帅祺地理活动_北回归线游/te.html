						<audio autoplay  id="myAudio" src="au/0.mp3" id="myAudio"></audio>
			<div id="status" class="status"></div>
    
    <script>
        const audio = document.getElementById('myAudio');
        const statusDiv = document.getElementById('status');
        let playAttempts = 0;
        const maxPlayAttempts = 5;
        
        // 自动播放策略
        function attemptAutoPlay() {
            // 重置音频到开始
            audio.currentTime = 0;
            
            const playPromise = audio.play();
            
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    // 播放成功
                    statusDiv.textContent = "";
                    statusDiv.className = "status playing";
                    playAttempts = 0; // 重置尝试次数
                })
                .catch(error => {
                    // 播放失败
                    playAttempts++;
                    statusDiv.textContent = `自动播放被阻止 (尝试 ${playAttempts}/${maxPlayAttempts})。请点击播放按钮或允许自动播放。`;
                    statusDiv.className = "status not-playing";
                    
                    if (playAttempts < maxPlayAttempts) {
                        // 延迟后再次尝试
                        setTimeout(attemptAutoPlay, 2000);
                    }
                });
            }
        }
        
        // 检测音频是否在播放
        function checkIfPlaying() {
            if (audio.paused) {
                statusDiv.textContent = "";
                statusDiv.className = "status not-playing";
                attemptAutoPlay();
            } else {
                statusDiv.textContent = "";
                statusDiv.className = "status playing";
            }
        }
        
        // 页面加载后尝试自动播放
        window.addEventListener('load', function() {
            // 现代浏览器要求音频播放必须由用户交互触发
            // 所以这里只是初始化，真正的播放尝试会在用户交互后开始
            
            // 添加点击事件监听，用户点击页面任何地方后尝试播放
            document.body.addEventListener('click', function() {
                attemptAutoPlay();
                // 移除点击事件，避免重复绑定
                document.body.removeEventListener('click', arguments.callee);
            }, { once: true });
            
            // 设置循环检测
            setInterval(checkIfPlaying, 3000);
        });
        
        // 监听音频结束事件，重新播放
        audio.addEventListener('ended', function() {
            attemptAutoPlay();
        });
    </script>
